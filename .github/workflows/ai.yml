name: Update AI Rules

on:
  schedule:
    # 每周一凌晨 4 点（北京时间）
    - cron: "0 4 * * 1"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout subscribe repo
        uses: actions/checkout@v5

      - name: Download source ai.list
        run: |
          curl -fL \
            "https://raw.githubusercontent.com/DustinWin/ruleset_geodata/mihomo-ruleset/ai.list" \
            -o ai-source.list

      - name: Generate filtered domain list
        run: |
          tr '[:space:]' '\n' < ai-source.list \
            | sed 's/\r$//' \
            | sed '/^$/d' \
            | sed 's/^+\.//' \
            | grep -viE 'aws|amazon' \
            | awk '!seen[$0]++' \
            > ai-domain.list

          echo "过滤后域名数量："
          wc -l ai-domain.list

      - name: Generate ai.list
        run: |
          awk '{print "DOMAIN-SUFFIX," $0}' ai-domain.list > ai.list

          echo "ai.list 前 20 行："
          head -n 20 ai.list

      - name: Generate ai.yaml
        run: |
          {
            echo "payload:"
            awk '{print "  - DOMAIN-SUFFIX," $0}' ai-domain.list
          } > ai.yaml

          echo "ai.yaml 前 20 行："
          head -n 20 ai.yaml

      - name: Commit and push
        run: |
          rm -f ai-source.list ai-domain.list

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ai.list ai.yaml

          if git diff --cached --quiet; then
            echo "ai.list 和 ai.yaml 没有变化，不提交。"
          else
            git commit -m "update ai rules"
            git push
          fi
