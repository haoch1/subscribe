name: Update ai.mrs without AWS Amazon

on:
  schedule:
    # 每周一凌晨 4 点，按北京时间运行
    - cron: "0 4 * * 1"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout subscribe repo
        uses: actions/checkout@v5

      - name: Download source ruleset text
        run: |
          curl -fL \
            "https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/ai.list" \
            -o ai-source.list

      - name: Remove AWS and Amazon rules
        run: |
          grep -viE 'aws|amazon' ai-source.list > ai.list

          echo "原始规则数量："
          wc -l ai-source.list

          echo "过滤后规则数量："
          wc -l ai.list

          echo "被删除的规则："
          grep -iE 'aws|amazon' ai-source.list || true

      - name: Download latest mihomo
        run: |
          API_JSON="$(curl -fsSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest)"

          DOWNLOAD_URL="$(echo "$API_JSON" | jq -r '
            .assets[]
            | select(.name | test("^mihomo-linux-amd64-compatible-v.*\\.gz$"))
            | .browser_download_url
          ' | head -n 1)"

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            DOWNLOAD_URL="$(echo "$API_JSON" | jq -r '
              .assets[]
              | select(.name | test("^mihomo-linux-amd64-v[0-9].*\\.gz$"))
              | .browser_download_url
            ' | head -n 1)"
          fi

          echo "Downloading: $DOWNLOAD_URL"
          curl -fL "$DOWNLOAD_URL" -o mihomo.gz

          gzip -d mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      - name: Convert to ai.mrs
        run: |
          ./mihomo convert-ruleset domain text ai.list ai.mrs

      - name: Commit and push
        run: |
          rm -f ai-source.list

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ai.list ai.mrs

          if git diff --cached --quiet; then
            echo "ai.list 和 ai.mrs 没有变化，不提交。"
          else
            git commit -m "update ai ruleset without aws amazon"
            git push
          fi
